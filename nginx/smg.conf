# ─── VPS Nginx Reverse-Proxy Configuration (Initial setup for Certbot) ───
# File: /etc/nginx/sites-available/smg
#
# IMPORTANT: Replace every occurrence of "yourdomain.com" with your real domain.
#
# Once this file is in place, run Certbot. Certbot will automatically 
# add the SSL certificates, HTTPS redirects, and security settings for you!
#
# Run:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to the Docker frontend container on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # File upload size limit (adjust if you handle large files)
    client_max_body_size 20M;

    # Security headers (Certbot will wrap these in SSL later)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logging
    access_log /var/log/nginx/smg_access.log;
    error_log  /var/log/nginx/smg_error.log;
}
